<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <style>
        .line { stroke: #ffb400; stroke-width: 0.5; fill: none; opacity: 0.1; }
        .node { fill: #ffb400; opacity: 0.2; }
        .grid { stroke: rgba(255, 180, 0, 0.05); stroke-width: 0.2; }
    </style>
    <defs>
        <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" class="grid" fill="none"/>
        </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#smallGrid)" />
    
    <!-- Tech Lines -->
    <path class="line" d="M 20 20 L 60 20 L 80 40 L 80 80" />
    <path class="line" d="M 160 140 L 160 100 L 140 80 L 100 80" />
    <path class="line" d="M 40 160 L 40 120 L 60 100" />
    <path class="line" d="M 180 20 L 140 20 L 120 40" />
    
    <!-- Nodes -->
    <circle class="node" cx="20" cy="20" r="1.5" />
    <circle class="node" cx="80" cy="80" r="2" />
    <circle class="node" cx="160" cy="140" r="1.5" />
    <circle class="node" cx="100" cy="80" r="1.5" />
    <circle class="node" cx="40" cy="160" r="2" />
</svg>
