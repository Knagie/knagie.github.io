<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knagie | ChromeFlow</title>
    <meta name="description" content="Explore the future of content creation with ChromeFlow and Knagie's digital experiments.">
    <link rel="icon" type="image/webp" href="./includes/favicon.webp">
    <link rel="stylesheet" href="includes/modern.css">
    <!-- Font Awesome for subtle icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <section class="hero">
        <div class="content-wrapper animate">
            <h1 class="animate delay-1">ChromeFlow</h1>
            <p class="animate delay-2">Experience the next generation of AI content creation. Fluid, powerful, and designed for the modern web.</p>
            <a href="https://chromeflow.app" class="cta-button animate delay-2" target="_blank">Launch App</a>
        </div>

        <footer class="footer animate delay-2">
            <div>
                © 2026 Knagie. Built with <i class="fas fa-bolt" style="color: var(--accent-color);"></i>
            </div>
            <div style="font-size: 0.8rem; opacity: 0.6;">
                Status: <span id="secret-status" style="cursor: pointer;">Active</span> // build.20260126.<a href="playground/fancy-UGT.html" class="secret-link">0</a>
            </div>
        </footer>
    </section>

    <script>
        // Subtle interaction for the playground
        const secretStatus = document.getElementById('secret-status');
        let clicks = 0;
        secretStatus.addEventListener('click', () => {
            clicks++;
            if (clicks === 5) {
                window.location.href = 'playground/';
            }
            setTimeout(() => { clicks = 0; }, 2000);
        });

        // Konami Code for fun
        const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        let konamiIndex = 0;

        document.addEventListener('keydown', (e) => {
            if (e.key === konamiCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) {
                    window.location.href = 'playground/';
                    konamiIndex = 0;
                }
            } else {
                konamiIndex = 0;
            }
        });
    </script>
</body>
</html>
